<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Hallway Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            z-index: 10;
        }

        button {
            width: 100px;
            height: 60px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #0052a3;
        }

        button:active {
            background: #003d7a;
        }

        .forward { grid-column: 2; }
        .backward { grid-column: 2; grid-row: 2; }
        .turnLeft { grid-column: 1; }
        .turnRight { grid-column: 3; }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            max-width: 300px;
        }

        .controls-hint {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            font-size: 12px;
            max-width: 250px;
        }
    </style>
</head>
<body>
    <div class="info">
        <h3>Endless Hallway Gallery</h3>
        <p>Explore the gallery and admire the artwork on the walls.</p>
    </div>

    <div id="paintingInfo" class="info" style="left: 50%; transform: translateX(-50%); max-width: 420px; text-align: center;">
        <h3>No Painting Selected</h3>
        <p>Turn left or right to inspect a painting.</p>
    </div>

    <div id="motionBlur" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; transition: opacity 0.1s; background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.3) 100%); z-index: 1;"></div>

    <div class="controls-hint">
        <p><strong>Keyboard Controls:</strong></p>
        <p>W - Forward</p>
        <p>S - Backward</p>
        <p>Q - Turn Left</p>
        <p>E - Turn Right</p>
    </div>

    <div class="controls">
        <button class="turnLeft">⬅ Turn Left</button>
        <button class="forward">⬆ Forward</button>
        <button class="turnRight">Turn Right ➡</button>
        <button class="backward">⬇ Backward</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a2a2a);
        scene.fog = new THREE.Fog(0x2a2a2a, 50, 200);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0); // Eye level height

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Player movement
        const player = {
            position: new THREE.Vector3(0, 0, 0),
            direction: 0, // 0 = forward, 1 = right, 2 = backward, 3 = left
            moveDistance: 5, // Distance of one painting
            rotationSpeed: Math.PI / 2 // 90 degrees per turn
        };

        const view = {
            position: player.position.clone(),
            direction: player.direction
        };

        const stepAnimation = {
            active: false,
            startTime: 0,
            durationMs: 800,
            fromPosition: new THREE.Vector3(),
            toPosition: new THREE.Vector3(),
            fromDirection: 0,
            toDirection: 0
        };

        const MOVE_DURATION_MS = 800;
        const TURN_DURATION_MS = 1000;

        let blurUntil = 0;
        function triggerMotionBlur(durationMs = 140) {
            blurUntil = Math.max(blurUntil, performance.now() + durationMs);
        }

        let pressedThisFrame = {};

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (!pressedThisFrame[key]) {
                pressedThisFrame[key] = true;
            }
        });

        // Button controls
        const forwardBtn = document.querySelector('.forward');
        const backwardBtn = document.querySelector('.backward');
        const turnLeftBtn = document.querySelector('.turnLeft');
        const turnRightBtn = document.querySelector('.turnRight');

        forwardBtn.addEventListener('click', () => { pressedThisFrame['w'] = true; });
        backwardBtn.addEventListener('click', () => { pressedThisFrame['s'] = true; });
        turnLeftBtn.addEventListener('click', () => { pressedThisFrame['q'] = true; });
        turnRightBtn.addEventListener('click', () => { pressedThisFrame['e'] = true; });

        function moveForward() {
            const moveDistance = player.moveDistance;
            player.position.z -= moveDistance * Math.cos(player.direction);
            player.position.x -= moveDistance * Math.sin(player.direction);
        }

        function moveBackward() {
            const moveDistance = player.moveDistance;
            player.position.z += moveDistance * Math.cos(player.direction);
            player.position.x += moveDistance * Math.sin(player.direction);
        }

        function turnLeft() {
            player.direction += player.rotationSpeed;
        }

        function turnRight() {
            player.direction -= player.rotationSpeed;
        }

        function normalizeAngle(angle) {
            let a = angle;
            while (a > Math.PI) a -= Math.PI * 2;
            while (a < -Math.PI) a += Math.PI * 2;
            return a;
        }

        function startStep(action) {
            if (stepAnimation.active) {
                return;
            }

            stepAnimation.fromPosition.copy(view.position);
            stepAnimation.fromDirection = view.direction;

            if (action === 'forward' || action === 'backward') {
                stepAnimation.durationMs = MOVE_DURATION_MS;
            } else {
                stepAnimation.durationMs = TURN_DURATION_MS;
            }

            if (action === 'forward') moveForward();
            if (action === 'backward') moveBackward();
            if (action === 'turnLeft') turnLeft();
            if (action === 'turnRight') turnRight();

            stepAnimation.toPosition.copy(player.position);
            stepAnimation.toDirection = player.direction;
            stepAnimation.startTime = performance.now();
            stepAnimation.active = true;
            triggerMotionBlur(stepAnimation.durationMs + 40);
        }

        function easeInOut(t) {
            return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        }

        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const HALLWAY_STEP = 5;
        const SIDE_LEFT_X = -2.4;
        const SIDE_RIGHT_X = 2.4;

        const fallbackCatalog = [
            { title: 'Untitled Study I', artist: 'Unknown', year: '1881', description: 'Oil on panel.' },
            { title: 'Harbor at Dusk', artist: 'Unknown', year: '1902', description: 'Coastal evening scene.' },
            { title: 'Portrait in Red', artist: 'Unknown', year: '1910', description: 'Formal portrait.' },
            { title: 'The Orchard Path', artist: 'Unknown', year: '1896', description: 'Landscape with trees.' },
            { title: 'City Rain', artist: 'Unknown', year: '1921', description: 'Urban impression.' },
            { title: 'Blue Interior', artist: 'Unknown', year: '1930', description: 'Domestic scene.' }
        ];

        let paintingCatalog = [];
        let catalogCursor = 0;

        async function loadPaintingCatalog() {
            const hasSupabaseCreds =
                SUPABASE_URL !== 'YOUR_SUPABASE_URL' &&
                SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';

            if (!hasSupabaseCreds || !window.supabase || !window.supabase.createClient) {
                paintingCatalog = fallbackCatalog;
                return;
            }

            try {
                const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { data, error } = await client
                    .from('paintings')
                    .select('title, artist, year, description, image_url')
                    .order('id', { ascending: true });

                if (error || !data || data.length === 0) {
                    paintingCatalog = fallbackCatalog;
                    return;
                }

                paintingCatalog = data;
            } catch (err) {
                paintingCatalog = fallbackCatalog;
            }
        }

        function nextCatalogPainting() {
            if (paintingCatalog.length === 0) {
                paintingCatalog = fallbackCatalog;
            }

            const painting = paintingCatalog[catalogCursor % paintingCatalog.length];
            catalogCursor += 1;
            return painting;
        }

        // Create hallway floor
        const floorGeometry = new THREE.PlaneGeometry(5, 500);
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        floor.position.z = -250;
        scene.add(floor);

        // Create hallway ceiling
        const ceilingGeometry = new THREE.PlaneGeometry(5, 500);
        const ceilingMaterial = new THREE.MeshStandardMaterial({ color: 0x666666 });
        const ceiling = new THREE.Mesh(ceilingGeometry, ceilingMaterial);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.y = 3;
        ceiling.position.z = -250;
        ceiling.receiveShadow = true;
        scene.add(ceiling);

        // Create hallway walls
        const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x888888 });

        const leftWallGeometry = new THREE.PlaneGeometry(500, 3);
        const leftWall = new THREE.Mesh(leftWallGeometry, wallMaterial);
        leftWall.rotation.y = Math.PI / 2;
        leftWall.position.x = -2.5;
        leftWall.position.y = 1.5;
        leftWall.position.z = -250;
        leftWall.receiveShadow = true;
        scene.add(leftWall);

        const rightWallGeometry = new THREE.PlaneGeometry(500, 3);
        const rightWall = new THREE.Mesh(rightWallGeometry, wallMaterial);
        rightWall.rotation.y = -Math.PI / 2;
        rightWall.position.x = 2.5;
        rightWall.position.y = 1.5;
        rightWall.position.z = -250;
        rightWall.receiveShadow = true;
        scene.add(rightWall);

        const artworks = [];

        // Create canvas textures for artworks
        function createArtworkTexture(hue) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            // Background
            ctx.fillStyle = `hsl(${hue}, 70%, 50%)`;
            ctx.fillRect(0, 0, 512, 512);

            // Border
            ctx.strokeStyle = `hsl(${hue}, 80%, 30%)`;
            ctx.lineWidth = 20;
            ctx.strokeRect(10, 10, 492, 492);

            // Geometric shapes
            ctx.fillStyle = `hsl(${(hue + 120) % 360}, 60%, 60%)`;
            ctx.beginPath();
            ctx.arc(256, 256, 150, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = `hsl(${(hue + 240) % 360}, 60%, 60%)`;
            ctx.fillRect(100, 100, 100, 100);
            ctx.fillRect(312, 312, 100, 100);

            // Add some text
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Artwork', 256, 456);

            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        function createPlaceholderTexture(painting, hue) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = `hsl(${hue}, 55%, 38%)`;
            ctx.fillRect(0, 0, 1024, 1024);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 24;
            ctx.strokeRect(24, 24, 976, 976);

            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.font = 'bold 62px Georgia';
            ctx.fillText(painting.title || 'Untitled', 512, 470);
            ctx.font = '42px Georgia';
            ctx.fillText(painting.artist || 'Unknown Artist', 512, 545);
            if (painting.year) {
                ctx.fillText(String(painting.year), 512, 605);
            }

            return new THREE.CanvasTexture(canvas);
        }

        function applyImageTextureIfAvailable(material, imageUrl) {
            if (!imageUrl) {
                return;
            }

            const loader = new THREE.TextureLoader();
            loader.setCrossOrigin('anonymous');
            loader.load(
                imageUrl,
                (loadedTexture) => {
                    material.map = loadedTexture;
                    material.needsUpdate = true;
                },
                undefined,
                () => {
                    // Keep placeholder if image cannot be loaded.
                }
            );
        }

        function addArtwork(painting, x, z, rotation, side, hue) {
            const geometry = new THREE.PlaneGeometry(1.5, 1.5);
            const texture = createPlaceholderTexture(painting, hue);
            const material = new THREE.MeshStandardMaterial({ map: texture });
            const mesh = new THREE.Mesh(geometry, material);

            mesh.position.set(x, 1.5, z);
            mesh.rotation.y = rotation;
            mesh.castShadow = true;
            mesh.receiveShadow = true;

            scene.add(mesh);
            applyImageTextureIfAvailable(material, painting.image_url);

            artworks.push({ x, z, rotation, mesh, side, painting });
        }

        function addArtworkPair(z) {
            const leftPainting = nextCatalogPainting();
            const rightPainting = nextCatalogPainting();
            const leftHue = Math.random() * 360;
            const rightHue = Math.random() * 360;

            addArtwork(leftPainting, SIDE_LEFT_X, z, Math.PI / 2, 'left', leftHue);
            addArtwork(rightPainting, SIDE_RIGHT_X, z, -Math.PI / 2, 'right', rightHue);
        }

        function getClosestArtworkForSide(side, targetZ) {
            let best = null;
            let bestDistance = Number.POSITIVE_INFINITY;

            for (let i = 0; i < artworks.length; i++) {
                const artwork = artworks[i];
                if (artwork.side !== side) continue;
                const distance = Math.abs(artwork.z - targetZ);
                if (distance < bestDistance) {
                    bestDistance = distance;
                    best = artwork;
                }
            }

            return best;
        }

        function updatePaintingInfo(sideLookAheadOffset) {
            const infoEl = document.getElementById('paintingInfo');
            const direction = ((view.direction % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            const lookingLeft = Math.abs(direction - Math.PI / 2) < Math.PI / 4;
            const lookingRight = Math.abs(direction - (Math.PI * 3) / 2) < Math.PI / 4;

            if (!lookingLeft && !lookingRight) {
                infoEl.innerHTML = '<h3>No Painting Selected</h3><p>Turn left or right to inspect a painting.</p>';
                return;
            }

            const side = lookingLeft ? 'left' : 'right';
            const targetZ = view.position.z - sideLookAheadOffset;
            const artwork = getClosestArtworkForSide(side, targetZ);

            if (!artwork || !artwork.painting) {
                infoEl.innerHTML = '<h3>No Painting Selected</h3><p>Turn left or right to inspect a painting.</p>';
                return;
            }

            const painting = artwork.painting;
            const title = painting.title || 'Untitled';
            const artist = painting.artist || 'Unknown Artist';
            const year = painting.year ? ` (${painting.year})` : '';
            const description = painting.description || 'No description available.';
            infoEl.innerHTML = `<h3>${title}</h3><p>${artist}${year}</p><p>${description}</p>`;
        }

        async function initializeGallery() {
            await loadPaintingCatalog();
            for (let z = 0; z >= -70; z -= HALLWAY_STEP) {
                addArtworkPair(z);
            }
        }

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            let isMoving = false;

            // Handle keyboard/button input as animated one-step actions.
            if (!stepAnimation.active) {
                if (pressedThisFrame['w']) {
                    startStep('forward');
                } else if (pressedThisFrame['s']) {
                    startStep('backward');
                } else if (pressedThisFrame['q']) {
                    startStep('turnLeft');
                } else if (pressedThisFrame['e']) {
                    startStep('turnRight');
                }
            }

            // Interpolate between current and next pose so movement is visible.
            if (stepAnimation.active) {
                const elapsed = performance.now() - stepAnimation.startTime;
                const rawT = Math.min(1, elapsed / stepAnimation.durationMs);
                const t = easeInOut(rawT);

                view.position.lerpVectors(stepAnimation.fromPosition, stepAnimation.toPosition, t);
                const deltaDir = normalizeAngle(stepAnimation.toDirection - stepAnimation.fromDirection);
                view.direction = stepAnimation.fromDirection + deltaDir * t;
                isMoving = true;

                if (rawT >= 1) {
                    view.position.copy(stepAnimation.toPosition);
                    view.direction = stepAnimation.toDirection;
                    stepAnimation.active = false;
                }
            }

            // Clear pressed keys for next frame
            pressedThisFrame = {};

            // Motion blur effect
            const motionBlur = document.getElementById('motionBlur');
            if (isMoving || performance.now() < blurUntil) {
                motionBlur.style.opacity = '0.15';
            } else {
                motionBlur.style.opacity = '0';
            }

            // Blend look-ahead continuously while turning so there is no snap/flicker.
            const sideFactor = Math.abs(Math.sin(view.direction));
            const sideLookAheadOffset = player.moveDistance * sideFactor;

            // Update camera position (player position + eye height)
            camera.position.x = view.position.x;
            camera.position.z = view.position.z - sideLookAheadOffset;

            // Update camera rotation based on direction
            camera.rotation.order = 'YXZ';
            camera.rotation.y = view.direction;
            updatePaintingInfo(sideLookAheadOffset);

            // Keep creating new artworks ahead to maintain endless hallway effect
            const furthestArtwork = Math.min(...artworks.map(a => a.z));
            if (player.position.z < furthestArtwork - 15) {
                const newZ = furthestArtwork - HALLWAY_STEP;
                addArtworkPair(newZ);
            }

            renderer.render(scene, camera);
        }

        initializeGallery().then(() => {
            animate();
        });
    </script>
</body>
</html>
